<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SSTU Phase 3 - Dashboard & Analyse Urbaine</title>
    <style>
        :root { 
            --bg: #0d1117; --panel: #161b22; --border: #30363d; 
            --cyan: #00f2ff; --green: #238636; --road: #1c2128; --red: #f85149;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; 
            color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        #main { display: flex; flex: 1; overflow: hidden; }
        #side { width: 250px; background: var(--panel); padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        
        .card { background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
        .label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        .val { font-family: 'Courier New', monospace; font-weight: bold; color: var(--cyan); float: right; }
        
        #view { flex: 1; display: flex; align-items: center; justify-content: center; background: #010409; position: relative; }
        canvas { background: var(--road); border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.7); }

        #stats-bar { 
            height: 100px; background: var(--panel); border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; padding: 0 20px;
        }
        .stat-box { text-align: center; min-width: 150px; }
        .stat-v { font-size: 1.6rem; color: var(--cyan); font-weight: bold; display: block; }
        
        .btn { width: 100%; padding: 10px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; background: #d29922; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        input[type=range] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>SSTU PHASE 3 | SYSTÈME D'ANALYSE DE TRAFIC (ESTI 2026)</div>
    <div id="clock">12:00:00</div>
</header>

<div id="main">
    <aside id="side">
        <div class="card"><span class="label">Automate de Markov</span><span id="st" style="color:#3fb950">FLUIDE</span></div>
        
        <div class="card">
            <span class="label">Monte Carlo (Spawn)</span>
            Probabilité: <span id="ui-flow" class="val">25%</span>
            <input type="range" id="flow" min="5" max="80" value="25">
        </div>

        <div class="card">
            <span class="label">Capacité Réseau</span>
            Max Voitures: <span id="ui-limit" class="val">40</span>
            <input type="range" id="limit" min="5" max="120" value="40">
        </div>

        <div class="card">
            <span class="label">Feux de Signalisation</span>
            Cycle: <span id="timer" class="val">5s</span>
        </div>
        
        <button class="btn" onclick="forceChange()">FORCER LE CHANGEMENT</button>
    </aside>

    <main id="view">
        <canvas id="cvs" width="900" height="600"></canvas>
    </main>
</div>

<div id="stats-bar">
    <div class="stat-box"><span class="stat-label">Débit (véh/min)</span><span id="stat-flow" class="stat-v">0</span></div>
    <div class="stat-box"><span class="stat-label">Temps de Trajet Moy.</span><span id="stat-time" class="stat-v">0s</span></div>
    <div class="stat-box"><span class="stat-label">Véhicules en Attente</span><span id="wait" class="stat-v">0</span></div>
    <div class="stat-box"><span class="stat-label">Efficacité Système</span><span id="stat-eff" class="stat-v">100%</span></div>
</div>

<script>
    const canvas = document.getElementById('cvs');
    const ctx = canvas.getContext('2d');
    
    // Configuration Simulation
    let cars = [], signalH = true, spawnP = 0.25, maxCars = 40, signalTimer = 5;
    const states = [{l:"FLUIDE", s:0.8}, {l:"LENT", s:0.3}]; 
    let curS = 0;

    // Métriques Phase 3
    let totalOut = 0;
    let travelTimes = [];
    let sessionStart = Date.now();

    const roadsH = [150, 450]; 
    const roadsV = [200, 325, 450, 575, 700];
    const intersections = [
        {x: 200, y: 150}, {x: 450, y: 150}, {x: 700, y: 150},
        {x: 325, y: 450}, {x: 575, y: 450}
    ];

    class Car {
        constructor(x, y, vx, vy, color) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.color = color;
            this.w = vx !== 0 ? 18 : 10;
            this.h = vy !== 0 ? 18 : 10;
            this.waiting = false;
            this.entryTime = Date.now();
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
            // Phares
            ctx.fillStyle = "white";
            if(this.vx > 0) ctx.fillRect(this.x + this.w/2 - 2, this.y - this.h/2, 2, this.h);
            if(this.vx < 0) ctx.fillRect(this.x - this.w/2, this.y - this.h/2, 2, this.h);
            if(this.vy > 0) ctx.fillRect(this.x - this.w/2, this.y + this.h/2 - 2, this.w, 2);
            if(this.vy < 0) ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, 2);
        }

        update() {
            let speed = 1.6 * states[curS].s;
            let move = true;

            // Détection Feux
            intersections.forEach(inter => {
                const dx = this.x - inter.x;
                const dy = this.y - inter.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 25 && dist < 45) {
                    if (this.vx !== 0 && !signalH) {
                        if ((this.vx > 0 && dx < 0) || (this.vx < 0 && dx > 0)) move = false;
                    }
                    if (this.vy !== 0 && signalH) {
                        if ((this.vy > 0 && dy < 0) || (this.vy < 0 && dy > 0)) move = false;
                    }
                }
            });

            // Anti-collision
            cars.forEach(o => {
                if (o === this) return;
                const gap = 25;
                if (Math.hypot(this.x - o.x, this.y - o.y) < gap) {
                    if (this.vx > 0 && o.x > this.x && Math.abs(this.y-o.y)<4) move = false;
                    if (this.vx < 0 && o.x < this.x && Math.abs(this.y-o.y)<4) move = false;
                    if (this.vy > 0 && o.y > this.y && Math.abs(this.x-o.x)<4) move = false;
                    if (this.vy < 0 && o.y < this.y && Math.abs(this.x-o.x)<4) move = false;
                }
            });

            if (move) {
                this.x += this.vx * speed; this.y += this.vy * speed;
                this.waiting = false;
            } else { this.waiting = true; }
        }
    }

    function forceChange() { signalH = !signalH; signalTimer = 5; }

    setInterval(() => {
        signalTimer--;
        if (signalTimer <= 0) { signalH = !signalH; signalTimer = 5; }
        document.getElementById('timer').innerText = signalTimer + "s";
    }, 1000);

    function drawMap() {
        ctx.fillStyle = "#1c2128"; ctx.fillRect(0,0,900,600);
        ctx.fillStyle = "#2d333b";
        roadsH.forEach(y => ctx.fillRect(0, y-20, 900, 40));
        roadsV.forEach(x => ctx.fillRect(x-20, 0, 40, 600));

        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.setLineDash([5, 5]);
        roadsH.forEach(y => { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(900,y); ctx.stroke(); });
        roadsV.forEach(x => { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,600); ctx.stroke(); });
        ctx.setLineDash([]);

        intersections.forEach(inter => {
            const g = "#3fb950", r = "#f85149";
            ctx.fillStyle = signalH ? g : r;
            ctx.beginPath(); ctx.arc(inter.x-28, inter.y-14, 4, 0, 7); ctx.arc(inter.x+28, inter.y+14, 4, 0, 7); ctx.fill();
            ctx.fillStyle = !signalH ? g : r;
            ctx.beginPath(); ctx.arc(inter.x+14, inter.y-28, 4, 0, 7); ctx.arc(inter.x-14, inter.y+28, 4, 0, 7); ctx.fill();
        });
    }

    function loop() {
        drawMap();

        if (Math.random() < spawnP && cars.length < maxCars) {
            let r = Math.random();
            if (r > 0.5) { 
                let yC = roadsH[Math.floor(Math.random()*roadsH.length)];
                let dir = Math.random() > 0.5 ? 1 : -1;
                let yL = yC + (dir === 1 ? 10 : -10);
                let startX = dir === 1 ? -30 : 930;
                if (!cars.some(c => Math.abs(c.x-startX)<40 && Math.abs(c.y-yL)<5))
                    cars.push(new Car(startX, yL, dir, 0, dir === 1 ? "#ff4d4d" : "#ffd900"));
            } else { 
                let xC = roadsV[Math.floor(Math.random()*roadsV.length)];
                let dir = Math.random() > 0.5 ? 1 : -1;
                let xL = xC + (dir === 1 ? -10 : 10);
                let startY = dir === 1 ? -30 : 630;
                if (!cars.some(c => Math.abs(c.y-startY)<40 && Math.abs(c.x-xL)<5))
                    cars.push(new Car(xL, startY, 0, dir, "#00f2ff"));
            }
        }

        let w = 0;
        cars = cars.filter(c => {
            if (c.x > -50 && c.x < 950 && c.y > -50 && c.y < 650) {
                c.update(); c.draw();
                if(c.waiting) w++;
                return true;
            } else {
                // Sortie de ville : enregistrer stats
                totalOut++;
                travelTimes.push((Date.now() - c.entryTime) / 1000);
                return false;
            }
        });
        
        document.getElementById('wait').innerText = w;
        requestAnimationFrame(loop);
    }

    // Update Dashboard Stats
    setInterval(() => {
        let mins = (Date.now() - sessionStart) / 60000;
        document.getElementById('stat-flow').innerText = (totalOut / mins).toFixed(1);
        
        if(travelTimes.length > 0) {
            let avg = travelTimes.reduce((a,b) => a+b) / travelTimes.length;
            document.getElementById('stat-time').innerText = avg.toFixed(1) + "s";
        }

        let eff = Math.max(0, 100 - (document.getElementById('wait').innerText * 2.5));
        document.getElementById('stat-eff').innerText = Math.floor(eff) + "%";
    }, 2000);

    document.getElementById('flow').oninput = (e) => { 
        spawnP = e.target.value/100; document.getElementById('ui-flow').innerText = e.target.value+"%"; 
    };
    document.getElementById('limit').oninput = (e) => { 
        maxCars = e.target.value; document.getElementById('ui-limit').innerText = e.target.value; 
    };
    
    setInterval(() => { curS = Math.random() < 0.8 ? 0 : 1; document.getElementById('st').innerText = states[curS].l; }, 4000);
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    loop();
</script>
</body>
</html>
